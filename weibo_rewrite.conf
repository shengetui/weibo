# Quantumult X rewrite rules for a cleaner Weibo feed.
#
# Put https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_feed_clean.js and https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_ad_empty.js in the same remote/local script
# location used by this profile, then import these rules.

[rewrite_local]
# Empty dedicated ad payloads.
^https:\/\/wbapp\.uve\.weibo\.com\/wbapplua\/wbpullad\.lua url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_ad_empty.js
^https:\/\/bootpreload\.uve\.weibo\.com\/v2\/ad\/preload url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_ad_empty.js
^https:\/\/adstrategy\.biz\.weibo\.com\/v3\/strategy\/ad url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_ad_empty.js
^https:\/\/sdkapp\.uve\.weibo\.com\/interface\/sdk\/(?:sdkconfig|get-lbs-cell-info)\.php url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_ad_empty.js

# Clean JSON feed/detail/search responses.
^https:\/\/api\.weibo\.cn\/2\/search\/(?:finder|container_discover|container_timeline|container_timeline_hot|unread_hot_timeline) url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/statuses\/container_detail(?:_comment)? url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/statuses\/container_timeline_hot url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/groups\/allgroups\/v2 url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/client\/(?:launch|tabbar|service|version) url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/search_hot_word url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/video\/machine url script-response-body https://raw.githubusercontent.com/shengetui/weibo/refs/heads/main/weibo_feed_clean.js

# Reject tracking and ad media requests seen in the capture.
^https?:\/\/(?:sdkmonitor|sdkaction|sdkclick|vs)\.biz\.weibo\.com\/ url reject-dict
^https?:\/\/datacollection\.uve\.weibo\.com\/ url reject-dict
^https?:\/\/api\.weibo\.cn\/2\/h5\/comonitor url reject-dict
^https?:\/\/kadmimage\.biz\.weibo\.com\/ad\/ url reject
^https?:\/\/ad\.us\.sinaimg\.cn\/ url reject
^https?:\/\/im-x\.jd\.com\/dsp\/ url reject-dict
^https:\/\/api\.weibo\.cn\/2\/(ug\/checkin\/list|push\/daily)\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/!\/live\/media_homelist\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/comments\/bullet_screens\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/photo\/info\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/statuses\/(container_positive|push_info)\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/vote\/get_vote_detail\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/!\/chaohua\/discovery\/home_bottom\/switch\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/!\/huati\/(discovery_home_bottom_getdotinfo|mobile_discovery_searchchange)\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/!\/wbox\/\w+\/(home_bottom_modal|interest_category)\? url reject-dict
# 发现页 热门微博信息流,搜索列表,热搜提醒,猜你想搜,视频流红包
^https:\/\/api\.weibo\.cn\/2\/search\/container_discover\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/hot\/hours_spotlight\? url reject-dict
^https:\/\/api\.weibo\.cn\/2\/video\/redpacket\? url reject-dict
^https:\/\/api\.weibo\.cn\/!\/sug\/list\/finderchange\? url reject-dict
^https?:\/\/bootrealtime\.uve\.weibo\.com\/v\d\/ad\/realtime Weibo url-and-header reject-dict
^https?:\/\/bootpreload\.uve\.weibo\.com\/v\d\/ad\/preload Weibo url-and-header reject-dict
^https?:\/\/sdkapp\.uve\.weibo\.com\/interface\/sdk\/(get-lbs-cell-info\.php|sdkconfig\.php) Weibo url-and-header reject-dict
^https?:\/\/(sdk|wb)app\.uve\.weibo\.com(/interface/sdk/sdkad.php|/wbapplua/wbpullad.lua) Weibo url-and-header script-response-body https://raw.githubusercontent.com/zmqcherish/proxy-script/main/weibo_launch.js
^https:\/\/card\.weibo\.com\/article\/m\/aj\/(reward|uvead)\? url reject-dict
^https:\/\/weibo\.com\/ttarticle\/x\/m\/aj\/(reward|uvead)\? url reject-dict

# 自定义tab皮肤
^https?:\/\/api\.weibo\.c(n|om)\/2\/!\/client\/light_skin Weibo url-and-header script-response-body https://raw.githubusercontent.com/zmqcherish/proxy-script/main/weibo_main.js

# 非会员设置tab皮肤 - cherish
^https?:\/\/new\.vip\.weibo\.c(n|om)\/littleskin\/preview Weibo url-and-header script-response-body https://raw.githubusercontent.com/zmqcherish/proxy-script/main/weibo_main.js

# 解锁微博会员APP图标
^https?:\/\/new\.vip\.weibo\.c(n|om)/aj/appicon/list Weibo url-and-header script-response-body https://github.com/fmz200/wool_scripts/raw/main/Scripts/weibo/weibo_vip.js

# 奥运奖牌榜横幅广告
# ^https:\/\/datumogs\.sports\.weibo\.c(n|om)\/wb\/api\/medal\/all\? url response-body "Banner":\[.+\] response-body "Banner":[]

^https:\/\/api\.weibo\.cn\/2\/!\/huati\/discovery_home_bottom_channels Weibo url-and-header reject-dict
^https:\/\/api\.weibo\.cn\/2\/!\/chaohua\/discovery\/home_bottom\/switch Weibo url-and-header reject-dict

[mitm]
hostname = *.weibo.cn, *.weibo.com, weibo.com
