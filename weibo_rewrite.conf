# Quantumult X rewrite rules for a cleaner Weibo feed.
#
# Put weibo_feed_clean.js and weibo_ad_empty.js in the same remote/local script
# location used by this profile, then import these rules.

[rewrite_local]
# Empty dedicated ad payloads.
^https:\/\/wbapp\.uve\.weibo\.com\/wbapplua\/wbpullad\.lua url script-response-body weibo_ad_empty.js
^https:\/\/bootpreload\.uve\.weibo\.com\/v2\/ad\/preload url script-response-body weibo_ad_empty.js
^https:\/\/adstrategy\.biz\.weibo\.com\/v3\/strategy\/ad url script-response-body weibo_ad_empty.js
^https:\/\/sdkapp\.uve\.weibo\.com\/interface\/sdk\/(?:sdkconfig|get-lbs-cell-info)\.php url script-response-body weibo_ad_empty.js

# Clean JSON feed/detail/search responses.
^https:\/\/api\.weibo\.cn\/2\/search\/(?:finder|container_discover|container_timeline) url script-response-body weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/statuses\/container_detail(?:_comment)? url script-response-body weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/groups\/allgroups\/v2 url script-response-body weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/client\/(?:launch|tabbar|service|version) url script-response-body weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/search_hot_word url script-response-body weibo_feed_clean.js
^https:\/\/api\.weibo\.cn\/2\/video\/machine url script-response-body weibo_feed_clean.js

# Reject tracking and ad media requests seen in the capture.
^https?:\/\/(?:sdkmonitor|sdkaction|sdkclick|vs)\.biz\.weibo\.com\/ url reject-dict
^https?:\/\/datacollection\.uve\.weibo\.com\/ url reject-dict
^https?:\/\/api\.weibo\.cn\/2\/h5\/comonitor url reject-dict
^https?:\/\/kadmimage\.biz\.weibo\.com\/ad\/ url reject
^https?:\/\/ad\.us\.sinaimg\.cn\/ url reject
^https?:\/\/im-x\.jd\.com\/dsp\/ url reject-dict

[mitm]
hostname = api.weibo.cn, wbapp.uve.weibo.com, bootpreload.uve.weibo.com, adstrategy.biz.weibo.com, sdkapp.uve.weibo.com, sdkmonitor.biz.weibo.com, sdkaction.biz.weibo.com, sdkclick.biz.weibo.com, datacollection.uve.weibo.com, kadmimage.biz.weibo.com, ad.us.sinaimg.cn, vs.biz.weibo.com, im-x.jd.com
